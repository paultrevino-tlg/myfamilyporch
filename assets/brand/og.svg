<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img"
     aria-label="My Family Porch — their stories, in their own voice">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#EBF1F8"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.1" r="0.7">
      <stop offset="0" stop-color="#DCE8FB"/>
      <stop offset="1" stop-color="#DCE8FB" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="chair" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#38BDF8"/>
    </linearGradient>
  </defs>

  <!-- Page -->
  <rect width="1200" height="630" fill="url(#page)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- ===== Right: porch scene with a rocking chair ===== -->
  <g>
    <!-- soft panel behind the scene -->
    <rect x="700" y="70" width="430" height="490" rx="28" fill="#FFFFFF" opacity="0.6"/>
    <rect x="700" y="70" width="430" height="490" rx="28" fill="none" stroke="#E1E9F2" stroke-width="2"/>

    <!-- porch roof eave -->
    <path d="M735 150 L915 95 L1095 150" fill="none" stroke="#2563EB" stroke-width="9"
          stroke-linejoin="round" stroke-linecap="round"/>
    <!-- posts -->
    <line x1="758" y1="150" x2="758" y2="472" stroke="#2563EB" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
    <line x1="1072" y1="150" x2="1072" y2="472" stroke="#2563EB" stroke-width="8" stroke-linecap="round" opacity="0.8"/>

    <!-- short sound-wave railing accent (the signature motif), kept clear of the chair -->
    <path d="M978 436 Q994 421 1010 436 Q1026 451 1042 436"
          fill="none" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" opacity="0.85"/>

    <!-- porch floor -->
    <line x1="748" y1="472" x2="1082" y2="472" stroke="#15233B" stroke-width="6" stroke-linecap="round" opacity="0.16"/>

    <!-- rocking chair (side view, facing left) — solid brand stroke for crisp contrast -->
    <g fill="none" stroke="#2563EB" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
      <path d="M832 460 Q915 504 998 452"/>            <!-- rocker runner -->
      <path d="M860 458 L872 356 L852 244"/>            <!-- back leg into backrest -->
      <path d="M902 356 L888 250"/>                     <!-- back slat -->
      <path d="M852 244 Q872 224 888 250"/>             <!-- headrest curve -->
      <path d="M872 356 L960 356"/>                     <!-- seat -->
      <path d="M960 356 L974 458"/>                     <!-- front leg -->
      <path d="M858 302 L960 314"/>                     <!-- armrest -->
      <path d="M960 314 L960 356"/>                     <!-- front arm post -->
    </g>
  </g>

  <!-- ===== Left: brand mark + wordmark + value prop ===== -->
  <!-- brand mark tile -->
  <g transform="translate(90,150)">
    <rect width="92" height="92" rx="22" fill="url(#tile)"/>
    <g transform="translate(46,46) scale(1.4) translate(-32,-32)">
      <path d="M13 20 L32 11 L51 20" fill="none" stroke="#fff" stroke-width="3.2"
            stroke-linejoin="round" stroke-linecap="round" opacity="0.92"/>
      <g fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 48 Q32 55 47 47"/>
        <path d="M24 48 L26 37 L24 22"/>
        <path d="M29 37 L28 23"/>
        <path d="M24 22 Q26 19 28 23"/>
        <path d="M26 37 L41 37"/>
        <path d="M41 37 L44 48"/>
        <path d="M25 29 L41 31"/>
        <path d="M41 31 L41 37"/>
      </g>
    </g>
  </g>

  <text x="92" y="320" font-family="Georgia, 'Times New Roman', serif" font-size="78"
        font-weight="600" fill="#15233B">My Family Porch</text>

  <text x="94" y="392" font-family="Georgia, 'Times New Roman', serif" font-size="46"
        font-style="italic" fill="#2563EB">Their stories, in their own voice.</text>

  <text x="95" y="462" font-family="Arial, Helvetica, sans-serif" font-size="28"
        fill="#15233B" opacity="0.7">Short, AI-guided voice interviews — gentle to use,</text>
  <text x="95" y="500" font-family="Arial, Helvetica, sans-serif" font-size="28"
        fill="#15233B" opacity="0.7">and kept as a keepsake your whole family can hear.</text>
</svg>
